<div class="flex flex-wrap items-stretch justify-center">
  @for (p of Productos(); track p.idProducto) {
    <div class="product-card m-2 border-1 w-72 flex flex-col h-full">
      <div class="image-container h-64">
        <p-image
          [src]="getImage(p)"
          width="100%"
          styleClass="w-full h-full flex items-center justify-center"
          imageClass="w-full h-full object-cover"
        ></p-image>
      </div>

      <div class="card-body flex flex-col flex-1 justify-between">
        <div>
          <div class="header-row">
            <p-message [severity]="p.catEstatus?.severity" [icon]="p.catEstatus?.icon_estatus">
              {{ p.catEstatus?.nombre_estatus }}
            </p-message>
            <div class="actions">
              <p-button
                icon="pi pi-heart"
                [rounded]="true"
                [text]="true"
                severity="help"
                size="small"
                [loading]="loading()"
                (onClick)="agregarCarritoCompra()"
              />
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                severity="info"
                size="small"
                [loading]="loading()"
                (onClick)="editarProducto(p)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                severity="danger"
                size="small"
                [loading]="loading()"
                (onClick)="eliminarProducto(p)"
              />
            </div>
          </div>
          <h2 class="title">{{ p.nombreProducto }}</h2>
        </div>

        <div class="footer-row mt-auto">
          <span class="price">{{ p.precio | currency }}</span>
          <div class="rating"><span class="star">★</span> 4.7</div>
        </div>
      </div>
    </div>
  } @empty {
    <p>No hay productos disponibles en este momento.</p>
  }
</div>
<p-confirmdialog />
