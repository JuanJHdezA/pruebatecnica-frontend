<div class="flex flex-col w-full h-screen overflow-hidden p-4">
  <!-- Encabezado Estático -->
  <div
    class="flex flex-wrap items-center justify-between w-full bg-white rounded-lg shadow-sm border border-gray-200 mb-6 flex-shrink-0"
  >
    <div class="flex-1 min-w-[200px] gap-3 p-2">
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          type="text"
          placeholder="Buscar por nombre o descripción..."
          class="w-full"
          (input)="filtrarPorTexto($event)"
        />
      </p-iconfield>
    </div>

    <div class="flex items-center gap-3 p-2">
      <p-select [options]="[]" placeholder="Todos los productos" styleClass="w-48" />
      <p-select [options]="[]" placeholder="Ordenar por" styleClass="w-40" />
    </div>
  </div>

  <!-- Lista con Scroll Estático -->
  @if (loading()) {
    <div class="flex justify-center items-center h-full">
      <p-progress-spinner />
    </div>
  } @else {
    <div class="flex-1 overflow-y-auto w-full">
      <!-- Importante: Pasamos ProductosFiltrados() en lugar de Productos() -->
      <app-producto [Productos]="ProductosFiltrados()" (onEliminar)="eliminarProdcuto($event)" [loading]="working()" />
    </div>
  }
</div>
