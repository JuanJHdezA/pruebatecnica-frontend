<header class="h-16 w-full bg-white border-b border-slate-200 px-6 flex items-center justify-between">
  <div class="flex items-center gap-4">
    <button class="text-slate-500 hover:text-indigo-600" (click)="toogleSidebar()">
      <i class="pi pi-chevron-left text-xl"></i>
    </button>
    <h2 class="text-lg font-semibold text-slate-800">E-Commerce Dashboard</h2>
  </div>

  <div class="flex items-center gap-4 text-slate-500">
    <button class="relative hover:text-indigo-600 transition-colors">
      <i class="pi pi-bell text-lg"></i>
      <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
    </button>

    <div class="flex items-center gap-4">
      <p-menu #menu [model]="items" [popup]="true"></p-menu>

      <button
        (click)="menu.toggle($event)"
        class="w-9 h-9 rounded-full overflow-hidden border border-slate-200 cursor-pointer"
      >
        <img src="assets/avatar.jpg" alt="Perfil" class="w-full h-full object-cover" />
      </button>
    </div>

    <button class="hover:text-indigo-600">
      <i class="pi pi-bars text-lg"></i>
    </button>
  </div>
</header>
