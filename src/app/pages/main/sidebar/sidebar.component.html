<aside class="w-64 h-full flex flex-col p-6 bg-[#0f172a] text-slate-400">
  <!-- Logo -->
  <div class="mb-8 px-2 flex items-center gap-3 cursor-pointer" (click)="mainComponent()">
    <div class="w-8 h-8 bg-indigo-500 rounded-lg"></div>
    <span class="text-white font-bold tracking-wide text-lg">Prueba Técnica</span>
  </div>

  <!-- Sección E-Commerce -->
  <div class="mb-6">
    <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3 px-2">E-Commerce</h3>

    <nav class="space-y-1 text-sm">
      <a
        routerLink="ecommerce/nuevo-producto/:code"
        class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-white/5 hover:text-white transition-all"
      >
        <i class="pi pi-plus"></i> Nuevo Producto
      </a>
      <a
        routerLink="ecommerce/lista-productos"
        class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-white/5 hover:text-white transition-all"
      >
        <i class="pi pi-list"></i> Lista de Productos
      </a>
    </nav>
  </div>
</aside>
