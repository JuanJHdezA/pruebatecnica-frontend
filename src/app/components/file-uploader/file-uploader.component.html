@if (loading()) {
  <p-skeleton class="w-full h-full" />
} @else {
  @if (!imageBase64()) {
    <div
      class="group relative w-full h-full border-2 border-dashed border-slate-300 rounded-xl bg-white flex flex-col items-center justify-center transition-all duration-500 hover:border-indigo-500 hover:bg-indigo-50 cursor-pointer"
    >
      <div class="text-center p-4 transition-all duration-300 group-hover:scale-105">
        <div
          class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3 group-hover:bg-indigo-100 transition-colors"
        >
          <i class="pi pi-upload text-2xl text-slate-400 group-hover:text-indigo-600 transition-colors"></i>
        </div>
        <p class="text-sm font-semibold text-slate-700">Haz clic o arrastra</p>
        <p class="text-xs text-slate-400 mt-1">PNG, JPG, WEBP (Max 5MB)</p>
      </div>
      <input
        type="file"
        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
        (change)="onFileSelected($event)"
        accept="image/*"
      />
    </div>
  } @else {
    <div class="relative w-full h-60 rounded-xl overflow-hidden border border-slate-200">
      <p-image
        [src]="imageBase64()"
        alt="Vista previa"
        width="100%"
        [preview]="true"
        styleClass="w-full h-full flex items-center justify-center"
        imageClass="w-full h-full object-cover"
      ></p-image>
      <button
        type="button"
        (click)="removerImagenAdunta()"
        class="absolute top-2 right-2 z-50 bg-red-500 hover:bg-red-600 text-white p-2 rounded-full shadow-lg transition-colors"
      >
        <i class="pi pi-trash"></i>
      </button>
    </div>
  }
}
